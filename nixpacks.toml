[phases.setup]
nixPkgs = ["nodejs_20", "pnpm-9_x"]

[phases.install]
cmds = ["corepack enable", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/api-spec run codegen",
  "pnpm --filter @workspace/db run build",
  "pnpm --filter @workspace/api-zod run build",
  "pnpm --filter @workspace/api-client-react run build",
  "pnpm --filter @workspace/clinic-app run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "pnpm --filter @workspace/db run push && node artifacts/api-server/dist/index.mjs"
